# ────────────────────────────────────────────────────────────────
# Howdy Jekyll Theme — Configuration Reference
# ────────────────────────────────────────────────────────────────
#
# Quick start:
#   1. Change "Site identity" values below
#   2. Update URL to your domain (e.g. https://yoursite.com)
#   3. Customize navigation, social links, and hero image
#   4. Run: bundle exec jekyll serve
#
# Testing:
#   bundle exec rake test             — Build + HTML validation (links, images, scripts)
#   bundle exec rake validate_config  — Check _config.yml for required fields
#   bundle exec rake build            — Build site only
#
# ⚠ IMPORTANT: Jekyll does NOT auto-reload when _config.yml changes.
# After editing this file, restart the dev server:
#   1. Stop the running server (Ctrl+C)
#   2. Run: bundle exec jekyll serve
#   (Livereload only watches content and layout files, not the config.)
#
# Sections:
#   [1]  Site identity       — Title, author, contact info
#   [2]  URL & base path     — Domain and subpath configuration
#   [3]  Brand               — Logo text and color palette
#   [4]  Favicon & OG images — Icons and social share thumbnails
#   [5]  Fonts               — Primary, mono, and script font selection
#   [6]  Navigation          — Top bar menu links
#   [7]  Jekyll internals    — Collections, pagination, plugins, defaults
#   [8]  Hero images         — Site-wide image fallback chain
#   [9]  Social links        — Profile icons
#  [10]  Analytics           — Google Analytics or Plausible
#  [11]  Reading time        — Estimate shown on posts
#  [12]  Share buttons       — Twitter, LinkedIn, Facebook, Reddit, HN, WhatsApp, Telegram, Email
#  [13]  Comments            — Giscus, Disqus, or Utterances
#  [14]  Newsletter          — Mailchimp, Buttondown, or custom form
#  [15]  Table of contents   — Auto-generated post sidebar
#  [16]  Custom CSS / JS     — Inject additional assets
#  [17]  Theme mode          — Default light/dark/auto
#  [18]  Homepage            — Hero, company logos
#  [19]  About page          — Bio, headline, resume
#  [20]  Contact page        — Methods, form, FAQ
#  [21]  Testimonials        — Social proof quotes
#  [22]  404 page            — Error page copy
# ────────────────────────────────────────────────────────────────

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [1] Site identity
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Displayed in <title>, meta tags, and site identity.
title: "Howdy"
description: "A clean and modern Jekyll theme for personal websites and portfolios."
author: "Your Name"
email: "hi@yoursite.com"

# tagline — Used as the homepage <title> and meta description.
# Typically your name + title, e.g. "Morgan Chen | Principal Product Designer".
tagline: "Your Name | Product Designer"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [2] URL & base path
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# url — Your full site domain (required for absolute URLs, feeds, sitemaps).
#       MUST be set for production. The default below is a placeholder.
# baseurl — Subpath if hosted at example.com/blog (use "" for root).
url: "https://example.com"
baseurl: ""

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [3] Brand
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# logo_text — Text-based logo rendered in the nav and hero overlay.
#             Uses Chaumont Script font. Set to "" to hide.
# colors — Optional CSS variable overrides. See _sass/_variables.scss
#          for the full list of overridable tokens.
#          Example:
#            colors:
#              accent_green: "#e63946"
#              text_primary: "#111827"
logo_text: "Howdy"
colors: {}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [4] Favicon & social share images
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# favicon — Light mode browser tab icon (PNG or SVG).
# favicon_dark — Dark mode browser tab icon.
# apple_touch_icon — 180×180 PNG for iOS home screen.
# og_image — 1200×630 PNG for Open Graph / social share previews.
# theme_color — Browser UI color (status bar, tab strip).
favicon: "/assets/images/favicon-light.png"
favicon_dark: "/assets/images/favicon-dark.png"
apple_touch_icon: "/assets/images/apple-touch-icon.png"
og_image: "/assets/images/og-image.png"
theme_color: "#008a1e"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [5] Fonts
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Fonts are loaded dynamically from Google Fonts based on these values.
#
# primary — Body and UI text. Choose ONE:
#   Inter | DM Sans | Plus Jakarta Sans | Instrument Sans |
#   Space Grotesk | Work Sans | Outfit | Manrope | Sora
#
# mono — Code blocks and monospaced text. Choose ONE:
#   Fragment Mono | JetBrains Mono | Fira Code
#   Note: You must add your own @font-face declaration or Google Fonts link
#   for the chosen font. Falls back to Courier New otherwise.
#
# script — Logo text. Chaumont Script ships locally.
#   To use a Google Fonts script, edit _includes/head.html.
fonts:
  primary: "DM Sans"
  mono: "Fragment Mono"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [6] Navigation
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Array of links rendered in the top bar.
# title — Display text.
# url — Path (must start with /). External URLs are also supported.
navigation:
  - title: "Home"
    url: "/"
  - title: "About"
    url: "/about"
  - title: "Projects"
    url: "/projects"
  - title: "Blog"
    url: "/blog"
  - title: "Contact"
    url: "/contact"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [7] Jekyll internals
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# theme — Uncomment when consuming this theme as a gem (not for local dev).
# theme: howdy-jekyll-theme

# collections — Custom content types.
#   projects — Portfolio items sorted by `year` front matter field.
#   projects.sort_reverse — Set true to show newest first (default: false).
collections:
  projects:
    output: true
    permalink: /projects/:slug/
    sort_by: year
    sort_reverse: true

# pagination — Powered by jekyll-paginate-v2.
#   per_page — Posts per blog page.
#   permalink — URL pattern for subsequent pages.
#   sort_reverse: true — Newest posts first.
pagination:
  enabled: true
  per_page: 5
  permalink: "page:num/"
  title: ":title - Page :num of :total"
  limit: 0
  sort_field: "date"
  sort_reverse: true
  prev_text: "Prev"
  next_text: "Next"

# autopages — Silences jekyll-paginate-v2 warning about collection/tag pages.
autopages: false

# blog — Blog index page settings.
#   hero_images — Explicit list of images for the blog hero carousel.
#     If set, only these images are shown (overrides auto-gathering from posts).
#   hero_image_limit — Max number of post images to auto-gather when hero_images
#     is not set. Defaults to 3. Set to a larger number or omit to include more.
blog:
  hero_image_limit: 3

# defaults — Front matter defaults applied by path/type.
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
  - scope:
      path: "about.md"
    values:
      layout: page
  - scope:
      path: "contact.md"
    values:
      layout: page
  - scope:
      path: "blog/index.html"
    values:
      layout: blog

# excerpt_separator — Divider for post teasers on blog index.
#   Use <!--more--> inside post content to define the cutoff.
excerpt_separator: "<!--more-->"

# plugins — Bundled plugins (already in Gemfile).
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate-v2

# exclude — Files/dirs skipped during build.
exclude:
  - Gemfile
  - Gemfile.lock
  - howdy-jekyll-theme.gemspec
  - README.md
  - LICENSE

# timezone — IANA timezone for date rendering.
timezone: America/New_York

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [8] Hero images — site-wide fallback
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Hero images follow a priority chain. Set them at the most specific level:
#
#   1. page.hero_images        — Front matter array (carousel, any page)
#   2. page.hero_image         — Front matter single image (any page)
#   3. site.blog.hero_images   — Blog index config array (optional)
#   4. Auto-gathered from projects/posts (projects index / blog index)
#   5. site.hero_images         — Config array below (carousel, site-wide)
#   6. site.hero_image          ← Config below (single image, last resort)
#
# The value below is the site-wide fallback. Override per-page via front
# matter, or use page-specific config keys (e.g. about_hero_image).
hero_image: /assets/illustrations/video-call.svg

# Carousel mode — Uncomment to use a crossfading slideshow instead.
# Overrides hero_image. Auto-advances every 3s, pauses on hover.
# hero_images:
#   - /assets/illustrations/web-design.svg
#   - /assets/illustrations/programmer.svg
#   - /assets/illustrations/designer.svg

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [9] Social links
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Displayed as SVG icons in the homepage footer.
# Remove a key to hide that icon. Add custom platforms by editing
# _includes/social-links.html.
social:
  github: "https://github.com/yourusername"
  twitter: "https://twitter.com/yourusername"
  linkedin: "https://linkedin.com/in/yourusername"
  instagram: "https://instagram.com/yourusername"
  dribbble: "https://dribbble.com/yourusername"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [10] Analytics
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Uncomment ONE block below to enable tracking.

# Google Analytics 4:
# analytics:
#   google_analytics: "G-XXXXXXXXXX"

# Plausible Analytics:
# analytics:
#   plausible:
#     domain: "yoursite.com"
#     script_url: "https://plausible.io/js/script.js"  # optional, self-hosted

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [11] Reading time
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Displays a "X min read" estimate on post pages (based on 200 wpm).
reading_time: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [12] Share buttons
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# enabled — Toggle the share bar on post pages.
# platforms — Array of enabled buttons. Supported:
#   twitter, linkedin, facebook, reddit, hackernews,
#   whatsapp, telegram, email (copy-link always included).
share_buttons:
  enabled: true
  platforms:
    - twitter
    - linkedin
#    - facebook
#    - reddit
#    - hackernews
#    - whatsapp
#    - telegram
    - email

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [13] Comments
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Supported providers: giscus, disqus, utterances.
# Uncomment ONE block and fill in your credentials.

# Giscus (GitHub Discussions):
# comments:
#   provider: "giscus"
#   giscus:
#     repo: "username/repo"
#     repo_id: "R_XXXXXXXX"
#     category: "Announcements"
#     category_id: "DIC_XXXXXXXX"
#     mapping: "pathname"    # pathname | url | title | og:title
#     strict: 0              # 0 or 1
#     reactions_enabled: 1   # 0 or 1
#     emit_metadata: 0       # 0 or 1
#     theme: "light"
#     lang: "en"

# Disqus:
# comments:
#   provider: "disqus"
#   disqus:
#     shortname: "your-disqus-shortname"

# Utterances (GitHub Issues):
# comments:
#   provider: "utterances"
#   utterances:
#     repo: "username/repo"
#     issue_term: "pathname"
#     theme: "github-light"
#     label: "comments"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [14] Newsletter signup
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Renders a subscribe form at the bottom of post pages.
# Supported providers: mailchimp, buttondown, custom.
#
# action_url — The form submission endpoint (provider-specific).
# For Mailchimp: find this in Audience > Signup forms > Embedded forms.
# For Buttondown: use https://buttondown.email/api/emails/embed-subscribe/YOUR_USERNAME
#
# newsletter:
#   enabled: false
#   provider: "mailchimp"
#   title: "Stay in the loop"
#   description: "Get occasional updates — no spam, ever."
#   placeholder: "your@email.com"
#   action_url: "https://yourdomain.usX.list-manage.com/subscribe/post?u=XXX&amp;id=XXX"
#   button_text: "Subscribe"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [15] Table of contents
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Auto-generates a "On this page" nav from post headings.
# enabled — Toggle TOC on all posts.
# min_heading / max_heading — Heading range to include (2 = h2, 3 = h3).
# Per-post override: add `table_of_contents: false` in front matter.
table_of_contents:
  enabled: true
  min_heading: 2
  max_heading: 3

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [16] Custom CSS / JS injection
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Paths to additional stylesheets or scripts injected before </head>
# or </body>. Relative to site root.
# custom_css: "/assets/css/custom.css"
# custom_js: "/assets/js/custom.js"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [17] Theme mode
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Sets the initial color scheme before the user toggles.
# "auto" — Follows the user's OS preference (default).
# "light" — Forces light mode on first visit.
# "dark" — Forces dark mode on first visit.
# Note: The user's localStorage override always takes precedence.
default_theme: "auto"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [18] Homepage
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Hero headline — 3 lines shown on the homepage.
# Use <br> for line breaks, <span class="text-muted"> for the last line.
hero:
  headline: "I design products for&nbsp;people<br>who work with&nbsp;complexity<br><span class=\"text-muted\">for analytics, AI, and design systems</span>"
  subtitle: "Product designer focused on B2B tools, design systems, and AI-native interfaces."
  cta_text: "View Projects"
  cta_url: "/projects/"

# Company logos — Homepage trusted-by marquee.
# enabled — Toggle the entire marquee section (default: true).
# items — Array of logos. Each item supports:
#   name   — Text displayed when no image is provided (required).
#   width  — Width in pixels for the logo slot (required).
#   url    — Optional clickable link (opens in new tab).
#   image  — Optional path to an image file (overrides text).
company_logos:
  enabled: true
  items:
    - name: "Arcadia"
      width: 120
    - name: "Orbital"
      width: 80
      url: "https://orbital.example.com"
    - name: "Cirrus"
      width: 70
      url: "https://cirrus.example.com"
    - name: "Pinnacle"
      width: 90
      url: "https://pinnacle.example.com"
    - name: "Aether"
      width: 110
    - name: "Lumin"
      width: 100
      url: "https://lumin.example.com"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [19] About page
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# about_title — <title> tag text for the about page.
# about_headline — Hero heading text on the about page (supports HTML).
# about_hero_image — Hero illustration path. Falls back to site.hero_image.
# about_bio — Intro paragraph (supports HTML).
# about_paragraph_2 — Second paragraph, optional.
# about_paragraph_3 — Third paragraph, optional.
# about_resume — Resume button config.
about_title: "About"
about_headline: "Designing with<br>intention, shipping<br><span class=\"text-muted\">with purpose</span>"
about_hero_image: "/assets/illustrations/designer.svg"
about_bio: >
  I've spent the last 8 years designing B2B SaaS products: design systems, analytics platforms, and AI-powered tools. I work in problem spaces where the UX patterns don't exist yet and need to be invented rather than applied.
about_paragraph_2: >
  I work at the intersection of design and engineering: I prototype in code, contribute to component libraries, and think in design tokens rather than pixel specs. The tools change (Figma, SwiftUI, React, Framer) but the practice stays the same: understand the user, build the right abstraction, iterate until it's invisible.
about_paragraph_3: "I've shipped products used by teams at companies ranging from early-stage startups to 500-person orgs. I'm looking for my next challenge: somewhere I can work on hard problems with people who care about craft."
about_resume:
  enabled: true
  text: "Download Resume"
  url: "/assets/resume.pdf"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# [20] Contact page
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# contact.intro — Shown above contact methods.
# contact.methods — Array of contact methods (email, location, schedule, availability).
# contact.form — Optional contact form. Set action to your form endpoint
#   (e.g. Formspree, Netlify Forms, or mailto: URL).
# contact.faq — Optional FAQ items to reduce unnecessary emails.
contact:
  intro: "Whether you're building something new, rethinking an existing product, or just want to talk design. I'd love to hear from you."
  response_time: "I usually respond within a couple of days."
  methods:
    - type: email
      label: "Email"
      value: "hi@yoursite.com"
      icon: email
    - type: schedule
      label: "Book a call"
      value: "Schedule a meeting"
      url: "https://calendly.com/yourusername"
    - type: location
      label: "Location"
      value: "Somewhere, Earth"
  form:
    enabled: true
    title: "Send a message"
    name_placeholder: "Your name"
    email_placeholder: "your@email.com"
    message_placeholder: "What's on your mind?"
    button_text: "Send message"
    action: "" # Form endpoint URL (e.g. Formspree). Leave empty for mailto:
  faq:
    enabled: true
    items:
      - question: "Are you available for freelance or contract work?"
        answer: "That depends on the project and my current capacity. Reach out and we'll figure out if it's a good fit."
      - question: "Can you give feedback on my portfolio or product?"
        answer: "I try to be helpful when I can. Send me a link and I'll take a look when I have bandwidth."
      - question: "Are you open to full-time roles?"
        answer: "Always open to interesting opportunities. Let's chat and see where things go."

