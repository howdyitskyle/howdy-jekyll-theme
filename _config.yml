# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Shown on the about page. Each item has quote, name, and role.
testimonials:
  - quote: "The best design system I've ever worked with. Period. She made the complex feel inevitable."
    name: "Alex Chen"
    role: "Engineering Lead, Arcadia"
  - quote: "She doesn't just design screens. She designs how teams think about problems. That's a rare skill."
    name: "Jordan Taylor"
    role: "VP of Product, Orbital"
  - quote: "Working with her raised the bar for everyone on the team. She made us all better designers."
    name: "Samira Patel"
    role: "Product Designer, Cirrus"

